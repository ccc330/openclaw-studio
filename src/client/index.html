<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>Studio — OpenClaw</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      /*
       * Theme bootstrap — ported from OpenClaw Control UI (dist/control-ui/index.html).
       * Reads the same localStorage key (`openclaw.control.settings.v1`) that Control UI
       * writes to, so a theme chosen there carries over here on first paint without a
       * flash of wrong theme.
       */
      (function () {
        var THEMES = { claw: 1, knot: 1, dash: 1 };
        var MODES = { system: 1, light: 1, dark: 1 };
        var LEGACY = {
          dark: "claw:dark",
          light: "claw:light",
          openknot: "knot:dark",
          fieldmanual: "dash:dark",
          clawdash: "dash:light",
          system: "claw:system"
        };
        try {
          var keys = Object.keys(localStorage);
          var raw;
          for (var i = 0; i < keys.length; i++) {
            if (keys[i].indexOf("openclaw.control.settings.v1") === 0) {
              raw = localStorage.getItem(keys[i]);
              if (raw) break;
            }
          }
          var theme = "claw";
          var mode = "system";
          if (raw) {
            var s = JSON.parse(raw);
            var t = s && s.theme;
            var m = s && s.themeMode;
            if (typeof t !== "string") t = "";
            if (typeof m !== "string") m = "";
            var legacy = LEGACY[t];
            theme = THEMES[t] ? t : legacy ? legacy.split(":")[0] : "claw";
            mode = MODES[m] ? m : legacy ? legacy.split(":")[1] : "system";
          }
          if (mode === "system") {
            mode = window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
          }
          var resolved =
            theme === "knot"
              ? mode === "light"
                ? "openknot-light"
                : "openknot"
              : theme === "dash"
              ? mode === "light"
                ? "dash-light"
                : "dash"
              : mode === "light"
              ? "light"
              : "dark";
          if (resolved !== "dark") {
            document.documentElement.setAttribute("data-theme", resolved);
          }
          document.documentElement.setAttribute(
            "data-theme-mode",
            resolved.indexOf("light") !== -1 ? "light" : "dark"
          );
        } catch (e) {
          /* noop — fall back to default (claw:dark) */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
